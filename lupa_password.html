<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lupa Password</title>
    <link rel="stylesheet" href="style_login.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Poppins&display=swap" rel="stylesheet">
</head>

<body class="auth-body">
    <div class="container">
        <div class="logo">
            <img src="1x/logo.png" alt="Logo">
        </div>
        <div class="card">
            <h1>RESET</h1>
            <p style="color: white; margin-bottom: 20px; font-size: 14px;">Masukkan email dan password baru</p>
            <form>
                <input type="email" placeholder="Email Anda" required>
                <div class="password-box">
                    <input type="password" id="passInput" placeholder="Password" required>
                    <img src="Asset 5.png" class="toggle-password" id="eyeIcon" onclick="togglePassword()">
                </div>
                <button type="submit">KIRIM</button>
            </form>
            <a href="login.html" style="color: #ffb800; text-decoration: none; font-size: 12px; display: block; margin-top: 15px;">Kembali ke Login</a>
        </div>
    </div>
    <script>
        function togglePassword() {
            const passInput = document.getElementById('passInput');
            const eyeIcon = document.getElementById('eyeIcon');

            if (passInput.type === "password") {
                passInput.type = "text";
                eyeIcon.src = "1x/Asset 6.png";
            } else {
                passInput.type = "password";
                eyeIcon.src = "1x/Asset 5.png";
            }
        }

        document.getElementById('loginForm').onsubmit = function(e) {
            e.preventDefault();
            window.location.href = "hlm_pembeli.html";
        }
    </script>
</body>

</html>
